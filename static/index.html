<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenCardTracker — Green Card + H-1B Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-600: #2563eb;
      --blue-500: #3b82f6;
      --blue-400: #60a5fa;
      --blue-50: #eff6ff;
      --green-600: #16a34a;
      --green-50: #f0fdf4;
      --red-500: #ef4444;
      --red-50: #fef2f2;
      --amber-500: #f59e0b;
      --amber-50: #fffbeb;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 40%, #2563eb 100%);
      padding: 48px 20px 64px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 0%, rgba(59,130,246,0.3) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 100%, rgba(99,102,241,0.2) 0%, transparent 50%);
      pointer-events: none;
    }
    .hero-content { position: relative; z-index: 1; }
    .hero h1 {
      font-size: 32px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .hero p {
      color: rgba(255,255,255,0.7);
      font-size: 15px;
      font-weight: 400;
    }

    /* ── Stat pills ── */
    .stat-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .stat-pill {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.9);
      font-size: 12px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 100px;
      white-space: nowrap;
    }
    .stat-pill strong { color: white; font-weight: 700; }

    /* ── Search ── */
    .search-wrap {
      max-width: 640px;
      margin: -28px auto 0;
      padding: 0 16px;
      position: relative;
      z-index: 10;
    }
    .search-inner {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-icon {
      position: absolute;
      left: 18px;
      width: 20px;
      height: 20px;
      color: var(--gray-400);
      pointer-events: none;
      transition: color var(--transition);
    }
    .search-inner:focus-within .search-icon { color: var(--blue-500); }
    .search-input {
      width: 100%;
      padding: 18px 20px 18px 50px;
      font-size: 16px;
      font-family: inherit;
      font-weight: 500;
      border: 2px solid transparent;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      outline: none;
      background: white;
      color: var(--gray-800);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .search-input::placeholder { color: var(--gray-400); font-weight: 400; }
    .search-input:focus {
      border-color: var(--blue-500);
      box-shadow: var(--shadow-lg), 0 0 0 4px rgba(59,130,246,0.15);
    }
    .search-clear {
      position: absolute;
      right: 14px;
      width: 28px;
      height: 28px;
      border: none;
      background: var(--gray-100);
      border-radius: 50%;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      color: var(--gray-500);
      font-size: 14px;
      transition: background var(--transition);
    }
    .search-clear:hover { background: var(--gray-200); }
    .search-clear.visible { display: flex; }

    /* ── Results container ── */
    .results {
      max-width: 900px;
      margin: 28px auto;
      padding: 0 16px 40px;
    }

    /* ── Hint / Empty / Loading ── */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
    }
    .state-msg .icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
      opacity: 0.5;
    }
    .state-msg .title {
      font-size: 17px;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 6px;
    }
    .state-msg .sub {
      font-size: 14px;
      color: var(--gray-400);
    }

    /* Spinner */
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--blue-500);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result count ── */
    .result-count {
      font-size: 13px;
      color: var(--gray-500);
      margin-bottom: 16px;
      font-weight: 500;
    }

    /* ── Employer card ── */
    .emp-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-200);
      margin-bottom: 16px;
      overflow: hidden;
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .emp-card:hover {
      box-shadow: var(--shadow);
    }

    .emp-head {
      padding: 16px 20px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background var(--transition);
    }
    .emp-head:hover { background: var(--gray-50); }
    .emp-head:active { background: var(--gray-100); }

    .emp-info { flex: 1; min-width: 0; }
    .emp-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--gray-900);
      line-height: 1.3;
      word-break: break-word;
    }
    .emp-loc {
      font-size: 13px;
      color: var(--gray-500);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }
    .emp-loc svg { width: 14px; height: 14px; flex-shrink: 0; }
    .emp-employees {
      font-size: 12px;
      color: var(--gray-400);
      margin-left: 4px;
    }

    .emp-variants {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .variant-chip {
      font-size: 11px;
      font-weight: 500;
      color: var(--gray-500);
      background: var(--gray-100);
      padding: 2px 8px;
      border-radius: 6px;
    }

    .emp-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }
    .filing-badge {
      background: var(--blue-50);
      color: var(--blue-600);
      font-size: 13px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 100px;
      white-space: nowrap;
    }
    .chevron {
      width: 20px; height: 20px;
      color: var(--gray-400);
      transition: transform var(--transition);
    }
    .emp-card.open .chevron { transform: rotate(180deg); }

    /* ── Filings panel ── */
    .emp-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .emp-card.open .emp-body {
      max-height: 5000px;
      transition: max-height 0.5s cubic-bezier(0, 0.5, 0.2, 1);
    }
    .emp-body-inner {
      border-top: 1px solid var(--gray-100);
    }

    /* ── Filing rows (unified for desktop + mobile) ── */
    .filing-row {
      border-bottom: 1px solid var(--gray-100);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background var(--transition);
    }
    .filing-row:last-child { border-bottom: none; }
    .filing-row:hover { background: var(--gray-50); }
    .filing-row:active { background: var(--gray-100); }

    .fr-summary {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 12px;
    }

    .fr-title-wrap { flex: 1; min-width: 0; }
    .fr-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-800);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fr-soc {
      font-size: 12px;
      color: var(--gray-400);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fr-wage {
      font-size: 14px;
      font-weight: 700;
      color: var(--green-600);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .fr-date {
      font-size: 12px;
      color: var(--gray-400);
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 72px;
      text-align: right;
    }

    .fr-arrow {
      width: 16px; height: 16px;
      color: var(--gray-300);
      flex-shrink: 0;
      transition: transform var(--transition), color var(--transition);
    }
    .filing-row.open .fr-arrow {
      transform: rotate(180deg);
      color: var(--blue-500);
    }

    /* Expanded detail */
    .fr-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .filing-row.open .fr-detail {
      max-height: 120px;
      transition: max-height 0.3s cubic-bezier(0, 0.5, 0.2, 1);
    }
    .fr-detail-inner {
      display: flex;
      gap: 16px;
      padding: 0 16px 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .fr-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--gray-500);
      font-weight: 500;
    }
    .fr-chip svg {
      width: 14px; height: 14px;
      color: var(--gray-400);
      flex-shrink: 0;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 100px;
      white-space: nowrap;
    }
    .status-badge.certified { background: var(--green-50); color: var(--green-600); }
    .status-badge.denied { background: var(--red-50); color: var(--red-500); }
    .status-badge.withdrawn { background: var(--gray-100); color: var(--gray-400); }
    .status-badge.other { background: var(--amber-50); color: var(--amber-500); }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .fy-tag {
      display: inline-block;
      background: var(--gray-100);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      color: var(--gray-500);
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .hero { padding: 36px 16px 52px; }
      .hero h1 { font-size: 26px; }
      .hero p { font-size: 13px; }
      .stat-bar { gap: 6px; }
      .stat-pill { font-size: 11px; padding: 4px 10px; }

      .search-input { padding: 16px 16px 16px 44px; font-size: 16px; }
      .search-icon { left: 14px; }

      .results { padding: 0 12px 32px; margin-top: 20px; }

      .emp-head { padding: 14px 16px; }
      .emp-name { font-size: 15px; }
      .filing-badge { font-size: 12px; padding: 5px 10px; }

      .fr-title { font-size: 13px; }
      .fr-wage { font-size: 13px; }
      .fr-summary { padding: 10px 14px; gap: 10px; }
    }

    /* ── Sort bar ── */
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--gray-100);
      background: var(--gray-50);
    }
    .sort-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-right: 4px;
    }
    .sort-btn {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-400);
      background: none;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-family: inherit;
      transition: all var(--transition);
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .sort-btn:hover { color: var(--gray-600); background: white; border-color: var(--gray-200); }
    .sort-btn.active { color: var(--blue-600); background: white; border-color: var(--blue-200); }
    .sort-btn .sort-arrow { font-size: 10px; }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--gray-200);
      padding: 0 16px;
    }
    .tab-btn {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-400);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
      font-family: inherit;
    }
    .tab-btn:hover { color: var(--gray-600); }
    .tab-btn.active {
      color: var(--blue-600);
      border-bottom-color: var(--blue-600);
    }
    .tab-btn .tab-count {
      font-weight: 700;
      margin-left: 4px;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Visa class chip ── */
    .visa-chip {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .visa-chip.h1b { background: #dbeafe; color: #1e40af; }
    .visa-chip.e3 { background: #fce7f3; color: #9d174d; }
    .visa-chip.h1b1 { background: #d1fae5; color: #065f46; }

    /* ── PW level chip ── */
    .pw-chip {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--amber-50);
      color: var(--amber-500);
    }

    /* ── Filing badge variants ── */
    .filing-badge.lca {
      background: #dbeafe;
      color: #1e40af;
    }

    /* ── Animations ── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .emp-card {
      animation: fadeSlideUp 0.3s ease both;
    }
    .emp-card:nth-child(2) { animation-delay: 0.04s; }
    .emp-card:nth-child(3) { animation-delay: 0.08s; }
    .emp-card:nth-child(4) { animation-delay: 0.12s; }
    .emp-card:nth-child(5) { animation-delay: 0.16s; }
  </style>
</head>
<body>

  <div class="hero">
    <div class="hero-content">
      <h1>GreenCardTracker</h1>
      <p>Search 3M+ Green Card &amp; H-1B immigration filings (FY2021 - FY2026)</p>
      <div class="stat-bar" id="stats"></div>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-inner">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" type="text" id="search" placeholder="Search employer — Green Card + H-1B filings (Google, Meta, Amazon...)" autofocus>
      <button class="search-clear" id="clearBtn" onclick="clearSearch()">&times;</button>
    </div>
  </div>

  <div class="results" id="results">
    <div class="state-msg">
      <span class="icon">&#128269;</span>
      <div class="title">Search immigration filings</div>
      <div class="sub">Type an employer name to explore Green Card &amp; H-1B sponsorship data</div>
    </div>
  </div>

  <script>
    const searchInput = document.getElementById('search');
    const resultsDiv = document.getElementById('results');
    const statsDiv = document.getElementById('stats');
    const clearBtn = document.getElementById('clearBtn');
    let debounceTimer;

    // Stats
    fetch('/api/stats')
      .then(r => r.json())
      .then(data => {
        let html = `<span class="stat-pill"><strong>${Number(data.perm_records || data.total_records).toLocaleString()}</strong>&nbsp;Green Card</span>`;
        if (data.lca_records) {
          html += `<span class="stat-pill"><strong>${Number(data.lca_records).toLocaleString()}</strong>&nbsp;H-1B</span>`;
        }
        html += `<span class="stat-pill"><strong>${Number(data.unique_employers).toLocaleString()}</strong>&nbsp;employers</span>`;
        statsDiv.innerHTML = html;
      });

    searchInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      const q = searchInput.value.trim();
      clearBtn.classList.toggle('visible', q.length > 0);
      if (q.length < 2) {
        resultsDiv.innerHTML = `
          <div class="state-msg">
            <span class="icon">&#128269;</span>
            <div class="title">Search immigration filings</div>
            <div class="sub">Type at least 2 characters to search</div>
          </div>`;
        return;
      }
      resultsDiv.innerHTML = `
        <div class="state-msg">
          <div class="spinner"></div>
          <div class="sub">Searching...</div>
        </div>`;
      debounceTimer = setTimeout(() => doSearch(q), 300);
    });

    function clearSearch() {
      searchInput.value = '';
      clearBtn.classList.remove('visible');
      searchInput.focus();
      resultsDiv.innerHTML = `
        <div class="state-msg">
          <span class="icon">&#128269;</span>
          <div class="title">Search immigration filings</div>
          <div class="sub">Type an employer name to explore labor certification data</div>
        </div>`;
    }

    async function doSearch(q) {
      try {
        const res = await fetch(`/api/employer-search?q=${encodeURIComponent(q)}&limit=50`);
        const data = await res.json();
        if (Array.isArray(data) && data.length > 0 && data[0].FEIN) {
          renderEntityResults(data);
        } else if (Array.isArray(data) && data.length > 0) {
          renderFlatResults(data);
        } else {
          resultsDiv.innerHTML = `
            <div class="state-msg">
              <span class="icon">&#128683;</span>
              <div class="title">No results found</div>
              <div class="sub">Try a different employer name</div>
            </div>`;
        }
      } catch (e) {
        resultsDiv.innerHTML = `
          <div class="state-msg">
            <span class="icon">&#9888;&#65039;</span>
            <div class="title">Something went wrong</div>
            <div class="sub">${esc(e.message)}</div>
          </div>`;
      }
    }

    function toggleCard(el) {
      el.closest('.emp-card').classList.toggle('open');
    }

    let tabIdCounter = 0;
    // Store filings data globally for sort/re-render
    const panelData = {};  // panelId -> { filings, type, sortKey, sortDir }

    function sortFilings(filings, key, dir) {
      return [...filings].sort((a, b) => {
        let va, vb;
        if (key === 'salary') {
          va = parseFloat(a.WAGE_FROM) || 0;
          vb = parseFloat(b.WAGE_FROM) || 0;
        } else if (key === 'date') {
          va = a.DECISION_DATE || '';
          vb = b.DECISION_DATE || '';
        } else if (key === 'title') {
          va = (a.JOB_TITLE || '').toLowerCase();
          vb = (b.JOB_TITLE || '').toLowerCase();
        }
        if (va < vb) return dir === 'asc' ? -1 : 1;
        if (va > vb) return dir === 'asc' ? 1 : -1;
        return 0;
      });
    }

    function buildSortBar(panelId) {
      const pd = panelData[panelId];
      const mk = (key, label) => {
        const isActive = pd.sortKey === key;
        const arrow = isActive ? (pd.sortDir === 'asc' ? '\u2191' : '\u2193') : '';
        return `<button class="sort-btn ${isActive ? 'active' : ''}" onclick="onSort('${panelId}','${key}')">${label}${arrow ? `<span class="sort-arrow">${arrow}</span>` : ''}</button>`;
      };
      return `<div class="sort-bar">
        <span class="sort-label">Sort</span>
        ${mk('date', 'Date')}
        ${mk('salary', 'Salary')}
        ${mk('title', 'Job Title')}
      </div>`;
    }

    function onSort(panelId, key) {
      const pd = panelData[panelId];
      if (pd.sortKey === key) {
        pd.sortDir = pd.sortDir === 'desc' ? 'asc' : 'desc';
      } else {
        pd.sortKey = key;
        pd.sortDir = key === 'title' ? 'asc' : 'desc';
      }
      rerenderPanel(panelId);
    }

    function rerenderPanel(panelId) {
      const pd = panelData[panelId];
      const sorted = sortFilings(pd.filings, pd.sortKey, pd.sortDir);
      const el = document.getElementById(panelId);
      const renderFn = pd.type === 'lca' ? renderLCAFilingRows : renderFilingRows;
      el.innerHTML = buildSortBar(panelId) + renderFn(sorted);
    }

    function renderEntityResults(employers) {
      const totalPerm = employers.reduce((s, e) => s + (e.FILING_COUNT || 0), 0);
      const totalLCA = employers.reduce((s, e) => s + (e.LCA_FILING_COUNT || 0), 0);
      let html = `<div class="result-count">${employers.length} employer${employers.length > 1 ? 's' : ''} &middot; ${totalPerm.toLocaleString()} Green Card &middot; ${totalLCA.toLocaleString()} H-1B filings</div>`;

      for (const emp of employers) {
        const filings = emp.filings || [];
        const lcaFilings = emp.lca_filings || [];
        const permCount = emp.FILING_COUNT || filings.length;
        const lcaCount = emp.LCA_FILING_COUNT || lcaFilings.length;
        const variants = (emp.NAME_VARIANTS || []).filter(v => v !== emp.CANONICAL_NAME);
        const tabId = tabIdCounter++;

        const permPanelId = `perm-${tabId}`;
        const lcaPanelId = `lca-${tabId}`;
        panelData[permPanelId] = { filings, type: 'perm', sortKey: 'date', sortDir: 'desc' };
        panelData[lcaPanelId] = { filings: lcaFilings, type: 'lca', sortKey: 'date', sortDir: 'desc' };

        const hasBoth = permCount > 0 && lcaCount > 0;
        const showTabs = hasBoth || lcaFilings.length > 0;

        html += `
          <div class="emp-card">
            <div class="emp-head" onclick="toggleCard(this)">
              <div class="emp-info">
                <div class="emp-name">${esc(emp.CANONICAL_NAME)}</div>
                <div class="emp-loc">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  ${esc(emp.CITY || '')}${emp.STATE ? ', ' + esc(emp.STATE) : ''}
                  ${emp.NUM_EMPLOYEES ? `<span class="emp-employees">&middot; ${Number(emp.NUM_EMPLOYEES).toLocaleString()} employees</span>` : ''}
                </div>
                ${variants.length > 0 ? `<div class="emp-variants">${variants.slice(0, 5).map(v => `<span class="variant-chip">${esc(v)}</span>`).join('')}${variants.length > 5 ? `<span class="variant-chip">+${variants.length - 5} more</span>` : ''}</div>` : ''}
              </div>
              <div class="emp-right">
                ${permCount > 0 ? `<div class="filing-badge">${permCount} Green Card</div>` : ''}
                ${lcaCount > 0 ? `<div class="filing-badge lca">${lcaCount} H-1B</div>` : ''}
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
              </div>
            </div>
            <div class="emp-body">
              <div class="emp-body-inner">
                ${showTabs ? `
                  <div class="tab-bar">
                    <button class="tab-btn active" onclick="switchTab(this, '${permPanelId}')">Green Card<span class="tab-count">${filings.length}</span></button>
                    <button class="tab-btn" onclick="switchTab(this, '${lcaPanelId}')">H-1B<span class="tab-count">${lcaFilings.length}</span></button>
                  </div>
                  <div class="tab-panel active" id="${permPanelId}">${buildSortBar(permPanelId)}${renderFilingRows(filings)}</div>
                  <div class="tab-panel" id="${lcaPanelId}">${buildSortBar(lcaPanelId)}${renderLCAFilingRows(lcaFilings)}</div>
                ` : `<div id="${permPanelId}">${buildSortBar(permPanelId)}${renderFilingRows(filings)}</div>`}
              </div>
            </div>
          </div>`;
      }
      resultsDiv.innerHTML = html;
    }

    function switchTab(btn, panelId) {
      const bar = btn.closest('.tab-bar');
      const body = bar.closest('.emp-body-inner');
      bar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      body.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(panelId).classList.add('active');
    }

    function renderFilingRows(filings) {
      return filings.map(j => `
        <div class="filing-row" onclick="this.classList.toggle('open')">
          <div class="fr-summary">
            <div class="fr-title-wrap">
              <div class="fr-title">${esc(j.JOB_TITLE || '\u2014')}</div>
              <div class="fr-soc">${esc(j.SOC_TITLE || '')}</div>
            </div>
            <div class="fr-wage">${fmtWage(j)}</div>
            <div class="fr-date">${fmtDate(j.DECISION_DATE)}</div>
            <svg class="fr-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="fr-detail">
            <div class="fr-detail-inner">
              ${statusBadge(j.CASE_STATUS)}
              <span class="fr-chip">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                ${esc(j.WORKSITE_CITY || '')}${j.WORKSITE_STATE ? ', ' + esc(j.WORKSITE_STATE) : ''}
              </span>
              <span class="fy-tag">${esc(j.FISCAL_YEAR)}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Keep backward compat for flat results
    function renderFilings(filings) { return renderFilingRows(filings); }

    function renderLCAFilingRows(filings) {
      if (!filings || filings.length === 0) return '<div style="padding:20px;text-align:center;color:var(--gray-400);font-size:13px;">No LCA filings found</div>';
      return filings.map(j => {
        const vc = (j.VISA_CLASS || '').toLowerCase();
        const vcClass = vc.includes('e-3') ? 'e3' : vc.includes('h-1b1') ? 'h1b1' : 'h1b';
        return `
        <div class="filing-row" onclick="this.classList.toggle('open')">
          <div class="fr-summary">
            <div class="fr-title-wrap">
              <div class="fr-title">${esc(j.JOB_TITLE || '\u2014')}</div>
              <div class="fr-soc">${esc(j.SOC_TITLE || '')}</div>
            </div>
            <span class="visa-chip ${vcClass}">${esc(j.VISA_CLASS || 'H-1B')}</span>
            <div class="fr-wage">${fmtWage(j)}</div>
            <div class="fr-date">${fmtDate(j.DECISION_DATE)}</div>
            <svg class="fr-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="fr-detail">
            <div class="fr-detail-inner">
              ${statusBadge(j.CASE_STATUS)}
              ${j.PW_WAGE_LEVEL ? `<span class="pw-chip">Level ${esc(j.PW_WAGE_LEVEL)}</span>` : ''}
              ${j.PREVAILING_WAGE ? `<span class="fr-chip">PW: ${fmtPW(j)}</span>` : ''}
              ${j.TOTAL_WORKER_POSITIONS && j.TOTAL_WORKER_POSITIONS !== '1' ? `<span class="fr-chip">${esc(j.TOTAL_WORKER_POSITIONS)} positions</span>` : ''}
              <span class="fr-chip">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                ${esc(j.WORKSITE_CITY || '')}${j.WORKSITE_STATE ? ', ' + esc(j.WORKSITE_STATE) : ''}
              </span>
              <span class="fy-tag">${esc(j.FISCAL_YEAR)}</span>
            </div>
          </div>
        </div>
      `}).join('');
    }

    function renderLCAFilings(filings) { return renderLCAFilingRows(filings); }

    function fmtPW(j) {
      if (!j.PREVAILING_WAGE) return '';
      const pw = Number(j.PREVAILING_WAGE);
      if (isNaN(pw)) return esc(j.PREVAILING_WAGE);
      const fmt = pw.toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
      const unit = j.PW_UNIT ? '/' + j.PW_UNIT.toLowerCase().replace('year', 'yr').replace('hour', 'hr') : '';
      return fmt + unit;
    }

    function renderFlatResults(data) {
      const groups = {};
      data.forEach(row => {
        const key = row.EMPLOYER_NAME;
        if (!groups[key]) groups[key] = { name: row.EMPLOYER_NAME, city: row.EMPLOYER_CITY, state: row.EMPLOYER_STATE, employees: row.EMPLOYER_NUM_EMPLOYEES, jobs: [] };
        groups[key].jobs.push(row);
      });

      let html = `<div class="result-count">${Object.keys(groups).length} employer${Object.keys(groups).length > 1 ? 's' : ''}</div>`;
      for (const [, group] of Object.entries(groups)) {
        const count = group.jobs.length;
        html += `
          <div class="emp-card">
            <div class="emp-head" onclick="toggleCard(this)">
              <div class="emp-info">
                <div class="emp-name">${esc(group.name)}</div>
                <div class="emp-loc">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  ${esc(group.city || '')}${group.state ? ', ' + esc(group.state) : ''}
                  ${group.employees ? `<span class="emp-employees">&middot; ${Number(group.employees).toLocaleString()} employees</span>` : ''}
                </div>
              </div>
              <div class="emp-right">
                <div class="filing-badge">${count} filing${count > 1 ? 's' : ''}</div>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
              </div>
            </div>
            <div class="emp-body">
              <div class="emp-body-inner">
                ${renderFilings(group.jobs)}
              </div>
            </div>
          </div>`;
      }
      resultsDiv.innerHTML = html;
    }

    function fmtDate(d) {
      if (!d) return '\u2014';
      const date = new Date(d);
      if (isNaN(date)) return esc(d);
      return date.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
    }

    function fmtWage(j) {
      if (!j.WAGE_FROM) return '\u2014';
      const from = Number(j.WAGE_FROM).toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
      const unit = j.WAGE_UNIT ? '/' + j.WAGE_UNIT.toLowerCase().replace('year', 'yr').replace('hour', 'hr') : '';
      if (j.WAGE_TO && j.WAGE_TO !== j.WAGE_FROM) {
        const to = Number(j.WAGE_TO).toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
        return `${from} \u2013 ${to}${unit}`;
      }
      return `${from}${unit}`;
    }

    function statusBadge(s) {
      if (!s) return '\u2014';
      const lower = s.toLowerCase();
      let cls = 'other';
      if (lower.includes('certified')) cls = 'certified';
      else if (lower.includes('denied')) cls = 'denied';
      else if (lower.includes('withdrawn')) cls = 'withdrawn';
      return `<span class="status-badge ${cls}"><span class="status-dot"></span>${esc(s)}</span>`;
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
